# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/continuum}
spring.data.mongodb.database=${MONGODB_DATABASE:continuum}

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
# In production, set `JWT_SECRET` via environment variable or secret manager.
# No insecure default is provided here to avoid accidental leakage.
jwt.secret=${JWT_SECRET:}
# Expiration in milliseconds (default 24h)
jwt.expiration=${JWT_EXPIRATION:86400000}

# Email Configuration
resend.api-key=${RESEND_API_KEY}
email.from=${EMAIL_FROM:noreply@continuum.com}
email.verification.url=${EMAIL_VERIFICATION_URL:http://localhost:5173/verify-email}
app.url=${APP_URL:http://localhost:5173}

# Stripe Configuration
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_}
stripe.price.pro=${STRIPE_PRICE_PRO_ID:price_}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:5173/subscription/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:5173/subscription/cancel}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.tech.lemnova.continuum_backend=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springdoc=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID:GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}

# VAULT - BACKBLAZE B2 CONFIGURATION
vault.b2.endpoint=s3.us-east-005.backblazeb2.com
vault.b2.bucket-name=continuum-vaults
vault.b2.access-key=${B2_ACCESS_KEY:}
vault.b2.secret-key=${B2_SECRET_KEY:}
vault.b2.region=us-east-005

# NOVAS CONFIGURAÇÕES (OPCIONAIS)
journal.max-content-size=${JOURNAL_MAX_CONTENT_SIZE:1048576}
vault.metadata-cache-ttl=${VAULT_METADATA_CACHE_TTL:300}
